name: run-tests

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            setup.py
          ignore-nothing-to-cache: true

      - name: Run pre-commit on changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            uvx pre-commit run --from-ref "${{ github.event.pull_request.base.sha }}" --to-ref "${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            uvx pre-commit run --from-ref "${{ github.event.before }}" --to-ref "${{ github.sha }}"
          else
            uvx pre-commit run --all-files
          fi

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.12", "3.11", "3.10", "3.9"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            setup.py
          ignore-nothing-to-cache: true

      - name: Install dependencies
        run: |
          uv venv .venv --python ${{ matrix.python-version }} --clear
          uv pip install -e ".[test]"

      - name: Test with pytest
        run: |
          uv run python -m pytest -v --cov=dlms_cosem
